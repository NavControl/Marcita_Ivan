    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>¿Quieres ser mi novia? 💖</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: 'Arial', sans-serif;
            }

            body, html {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background-color: #ff9ebe;
            }

            .screen {
                position: absolute;
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
                padding: 24px;
                transition: opacity 0.5s ease, transform 0.5s ease;
            }

            .hidden {
                opacity: 0;
                pointer-events: none;
                transform: scale(0.9);
            }

            #screen1, #screen2 {
                background: linear-gradient(180deg, #ff9ebe 0%, #ff7da4 100%);
                color: white;
            }

            .proposal-img {
                width: 180px;
                height: 180px;
                object-fit: cover;
                border-radius: 20px;
                margin-bottom: 25px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.15);
                border: 4px solid white;
                transition: transform 0.3s ease;
            }

            h1 {
                font-size: 2.1rem;
                line-height: 1.2;
                margin-bottom: 30px;
                text-shadow: 0px 2px 10px rgba(0,0,0,0.1);
                font-weight: bold;
            }

            h2 {
                font-size: 1.2rem;
                line-height: 1.4;
                font-weight: normal;
                text-shadow: 0px 2px 8px rgba(0,0,0,0.1);
                padding: 0 10px;
                margin-bottom: 35px;
            }

            .btn-container {
                display: flex;
                flex-direction: column;
                gap: 15px;
                width: 100%;
                max-width: 260px;
                position: relative;
                align-items: center;
            }

            .btn {
                background-color: #e6005c;
                color: white;
                border: none;
                padding: 12px 24px;
                font-size: 1.15rem;
                font-weight: bold;
                border-radius: 50px;
                cursor: pointer;
                box-shadow: 0 5px 15px rgba(0,0,0,0.15);
                transition: transform 0.1s ease, background-color 0.2s;
                text-decoration: none;
                display: inline-flex;
                justify-content: center;
                align-items: center;
                width: 100%;
                max-width: 260px;
                height: 50px;
            }

            .btn:active { transform: scale(0.95); }

            #btnNo {
                background-color: #f43f5e;
                z-index: 10;
            }

            /* --- PANTALLA 3: GALAXIA CON COMPORTAMIENTO PLANO --- */
            #screen3 {
                background:
                    radial-gradient(circle at 15% 20%, rgba(255,0,170,.30), transparent 35%),
                    radial-gradient(circle at 85% 70%, rgba(0,180,255,.25), transparent 35%),
                    radial-gradient(circle at 50% 50%, rgba(140,0,255,.18), transparent 40%),
                    radial-gradient(circle at 70% 20%, rgba(255,120,0,.15), transparent 30%),
                    radial-gradient(circle, #130021 0%, #080014 50%, #000000 100%);
                color: white;
                overflow: hidden;
                position: relative;
                cursor: grab;
                touch-action: none;
            }
            #screen3:active { cursor: grabbing; }

            .universe-center {
                width: 115px;
                height: 115px;
                background-image: url('Dulce.jpeg');
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                border-radius: 50%;
                box-shadow: 0 0 35px 20px #ff4500, inset 0 0 10px rgba(255,255,255,0.4);
                border: 3px solid rgba(255, 255, 255, 0.8);
                z-index: 500; 
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                pointer-events: none;
                will-change: transform;
            }

            .floating-text {
                position: absolute;
                font-weight: bold;
                /* SOMBRA ELIMINADA AQUÍ */
                white-space: nowrap;
                z-index: 5;
                transform-origin: center center;
                will-change: transform, opacity;
                user-select: none;
                left: 0;
                top: 0;
                padding: 4px 8px;
                background-color: rgba(0, 0, 0, 0.4); /* Fondo un poquito más oscuro para que resalten */
                border-radius: 10px;
            }
            #stars {
                position: absolute;
                inset: 0;
                overflow: hidden;
                pointer-events: none;
                z-index: 1;
            }

            .star {
                position: absolute;
                background: white;
                border-radius: 50%;
                animation: twinkle linear infinite;
            }

            @keyframes twinkle {
                0%,100% {
                    opacity: .15;
                }
                50% {
                    opacity: 1;
                }
            }
        </style>
    </head>
    <body>

        <audio id="background-music" preload="auto" loop>
            <source src="Mar.mp3" type="audio/mpeg">
        </audio>

        <div id="screen1" class="screen">
            <img src="Navi.jpg" alt="Portada" class="proposal-img" id="imgPortada">
            <h1 id="tituloPropuesta">¿Quieres ser mi<br>novia? 💖</h1>
            <div class="btn-container">
                <button class="btn" id="btnSi">Sí 💘</button>
                <button class="btn" id="btnNo">No 💔</button>
            </div>
        </div>

        <div id="screen2" class="screen hidden">
            <img src="Teamo.jpg" alt="Celebración" class="proposal-img">
            <h1>¡Sabía que<br>dirías que sí! 💞</h1>
            <h2>
                <b>Ahora nos tenemos que casar <br> 
                y tener un hijo para <br>
                reforzar nuestro amor 🐘💗✨</b>
            </h2>
            <button class="btn" id="btnRegalo">Abre el regalo 🎁</button>
        </div>

        <div id="screen3" class="screen hidden">
            <div id="stars"></div>
            <div class="universe-center" id="fotoCentro"></div>
        </div>

        <script>
            const screen1 = document.getElementById('screen1');
            const screen2 = document.getElementById('screen2');
            const screen3 = document.getElementById('screen3');
            const btnSi = document.getElementById('btnSi');
            const btnNo = document.getElementById('btnNo');
            const btnRegalo = document.getElementById('btnRegalo');
            const music = document.getElementById('background-music');
            
            const tituloPropuesta = document.getElementById('tituloPropuesta');
            const imgPortada = document.getElementById('imgPortada');
            const fotoCentro = document.getElementById('fotoCentro');
            const starsContainer = document.getElementById('stars');

            function crearEstrellas() {

                starsContainer.innerHTML = '';

                for (let i = 0; i < 600; i++) {

                    const star = document.createElement('div');

                    star.className = 'star';

                    const size = Math.random() * 3 + 1;

                    star.style.width = size + 'px';
                    star.style.height = size + 'px';

                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';

                    star.style.animationDuration =
                        (1 + Math.random() * 6) + 's';

                    starsContainer.appendChild(star);
                }
            }

            let datosFrases = [];
            let anguloY = 0; 
            let anguloX = 0.2; 
            
            let estaArrastrando = false;
            let inicioX = 0;
            let inicioY = 0;
            
            let escalaUniverso = 1.0; 
            let distanciaPinchInicial = 0;
            let escalaBasePinch = 1.0;

            let conteoNo = 0;
            const imagenRevelas = 'enojado.png';

            function iniciarMusicaSegura() {
                music.volume = 1.0;
                music.play().catch(e => console.log("Error audio:", e));
            }

            btnSi.addEventListener('click', () => {
                screen1.classList.add('hidden');
                screen2.classList.remove('hidden');
                iniciarMusicaSegura();
            });

            btnRegalo.addEventListener('click', () => {
                screen2.classList.add('hidden');
                screen3.classList.remove('hidden');
                iniciarMusicaSegura();
                setTimeout(() => { crearEstrellas();generarUniverso();inicializarInteractividad(); }, 100);
            });

            const moverBotonNo = () => {
                conteoNo++;
                if (conteoNo >= 5) {
                    tituloPropuesta.innerHTML = "¡Te revelas contra elmo! 😠";
                    imgPortada.src = imagenRevelas;
                    imgPortada.style.transform = "scale(1.08)"; 
                }
                btnNo.style.width = '130px';
                btnNo.style.height = '48px';
                btnNo.style.position = 'fixed';
                const x = Math.random() * (window.innerWidth - 140) + 10;
                const y = Math.random() * (window.innerHeight - 60) + 10;
                btnNo.style.left = `${x}px`;
                btnNo.style.top = `${y}px`;
            };

            btnNo.addEventListener('mouseenter', moverBotonNo);
            btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); moverBotonNo(); });

            const frases = [
                "✨ Brillas", "☀️ Mi sol", "🤭 Tu risa", "💎 Eres todo", "❤️ Te amo", 
                "🔥 Mi razón", "🥰 Alegría", "👩‍❤️‍👨 Mi amor", "✨ Todo mi mundo",
                "Te amo mil millones 🐘💗✨", "🌎 Mi universo", "👑 Mi reina", "💫 Magia pura", 
                "🌹 Hermosa", "🧸 Mi lugar seguro", "🔒 Mi elección", "🌟 Destino", 
                "Mi Mar 🌊", "⏳ Por siempre", "💭 Te pienso tanto", "💖 Latidos por ti", "🪐 Más allá de las estrellas",
                "🥇 Mi premio mayor", "🔮 Suerte la mía", "🍧 Dulzura total",
                "✨ Mi estrella fugaz", "🌊 Calma en mi tormenta", "🌅 Mi amanecer", "🍀 Mi amuleto",
                "🐾 Caminar de la mano", "🎈 Haces flotar mi corazón", "💫 Destellos de ti",
                "🎨 Poesía pura", "☕ Mi mejor café", "😘 No te reveles", "💌 Un amor", "🕯️ Luz en mi oscuridad",
                "💞 Almas gemelas", "🚀 Al infinito contigo", "🧸 Mi persona favorita", "💎 El tesoro más grande",
                "✍️ Escribes poesía en mi alma", "🌷 Tu dulzura me rescata",
                "✨ Coincidir contigo fue el milagro", "🕊️ Paz en tu mirada",
                "💫 Robaste la gravedad de mi corazón", "🌌 Creaste un Big Bang en mí", "🍯 Más dulce que la miel",
                "🥂 Por una vida a tu lado", "🌙 Te bajaría la luna entera",
                "🔭 Perdido en el mapa de tus ojos", "🔒 Dueña de todos mis suspiros",
                "🌊 Mi marea alta de felicidad", "💎 Ni todo el oro vale lo que tu sonrisa", "👄 Tus besos son mi hogar",
                "🎭 La escena más bella de mi vida", "🌌 Tu amor es mi constelación preferida", "🧁 Mi dulce adicción",
                "⛲ Fuente de mis sonrisas", "🎆 Iluminas mi noche más oscura", "🗝️ Tienes la llave de mi corazón"
            ];

            function generarUniverso() {
                const textosExistentes = screen3.querySelectorAll('.floating-text');
                textosExistentes.forEach(el => el.remove());
                
                datosFrases = [];
                const N = frases.length;
                const radioBase = Math.min(window.innerWidth, window.innerHeight) * 0.45;

                frases.forEach((texto, i) => {
                    const span = document.createElement('span');
                    span.className = 'floating-text';
                    span.innerText = texto;
                    
                    let tamanoFuente = 0.85;
                    if (texto.length > 22) tamanoFuente = 0.65;
                    else if (texto.length > 14) tamanoFuente = 0.75;
                    
                    span.style.fontSize = `${tamanoFuente}rem`;
                    screen3.appendChild(span);

                    const phi = Math.acos(-1 + (2 * i) / N);
                    const theta = Math.sqrt(N * Math.PI) * phi;

                    const factorRadioAleatorio = 0.75 + Math.random() * 0.5; 
                    const radioFinal = radioBase * factorRadioAleatorio;

                    const xLocal = radioFinal * Math.sin(phi) * Math.cos(theta);
                    const yLocal = radioFinal * Math.sin(phi) * Math.sin(theta);
                    const zLocal = radioFinal * Math.cos(phi);
                    
                    datosFrases.push({ 
                        elemento: span, 
                        x: xLocal,
                        y: yLocal,
                        z: zLocal,
                        anchoMitad: 0, 
                        altoMitad: 0 
                    });
                });

                datosFrases.forEach(frase => {
                    frase.anchoMitad = frase.elemento.offsetWidth / 2;
                    frase.altoMitad = frase.elemento.offsetHeight / 2;
                });

                actualizarPosiciones3D();
            }

            function actualizarPosiciones3D() {
                const centroX = window.innerWidth / 2;
                const centroY = window.innerHeight / 2;
                
                fotoCentro.style.transform = `translate(-50%, -50%) scale(${Math.max(0.7, Math.min(1.3, escalaUniverso))})`;

                const cosY = Math.cos(anguloY);
                const sinY = Math.sin(anguloY);
                const cosX = Math.cos(anguloX);
                const sinX = Math.sin(anguloX);

                datosFrases.forEach((frase) => {
                    let x1 = frase.x * cosY - frase.z * sinY;
                    let z1 = frase.z * cosY + frase.x * sinY;

                    let y2 = frase.y * cosX - z1 * sinX;
                    let z2 = z1 * cosX + frase.y * sinX;

                    const xFinal = x1 * escalaUniverso;
                    const yFinal = y2 * escalaUniverso;
                    const zFinal = z2 * escalaUniverso;

                    const pantallaX = centroX + xFinal;
                    const pantallaY = centroY + yFinal;
                    
                    const distanciaCamara = 600;
                    const factorEscalaPerspectiva = distanciaCamara / (distanciaCamara - zFinal);
                    
                    const escalaEfecto = Math.max(0.3, factorEscalaPerspectiva * 0.9);
                    const opacidadEfecto = Math.max(0.15, Math.min(1, (zFinal + 300) / 500));
                    
                    frase.elemento.style.transform = `translate3d(${pantallaX - frase.anchoMitad}px, ${pantallaY - frase.altoMitad}px, 0) scale(${escalaEfecto})`;
                    frase.elemento.style.opacity = opacidadEfecto;
                    
                    frase.elemento.style.zIndex = Math.round(zFinal + 1000);
                });
            }

            function obtenerDistanciaTactil(e) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                return Math.sqrt(dx * dx + dy * dy);
            }

            function inicializarInteractividad() {
                screen3.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    if (e.deltaY < 0) {
                        escalaUniverso += 0.04;
                    } else {
                        escalaUniverso -= 0.04;
                    }
                    escalaUniverso = Math.max(0.5, Math.min(2.2, escalaUniverso));
                    actualizarPosiciones3D();
                }, { passive: false });

                screen3.addEventListener('mousedown', (e) => { 
                    estaArrastrando = true; 
                    inicioX = e.clientX; 
                    inicioY = e.clientY; 
                    iniciarMusicaSegura(); 
                });
                
                window.addEventListener('mousemove', (e) => {
                    if (!estaArrastrando) return;
                    const deltaX = e.clientX - inicioX;
                    const deltaY = e.clientY - inicioY;
                    
                    anguloY += deltaX * 0.005;
                    anguloX -= deltaY * 0.005; 
                    
                    inicioX = e.clientX; 
                    inicioY = e.clientY; 
                    actualizarPosiciones3D();
                });
                
                window.addEventListener('mouseup', () => { estaArrastrando = false; });
                
                screen3.addEventListener('touchstart', (e) => {
                    iniciarMusicaSegura();
                    if (e.touches.length === 1) {
                        estaArrastrando = true;
                        inicioX = e.touches[0].clientX;
                        inicioY = e.touches[0].clientY;
                    } else if (e.touches.length === 2) {
                        estaArrastrando = false; 
                        distanciaPinchInicial = obtenerDistanciaTactil(e);
                        escalaBasePinch = escalaUniverso;
                    }
                });

                window.addEventListener('touchmove', (e) => {
                    if (e.touches.length === 1 && estaArrastrando) {
                        const deltaX = e.touches[0].clientX - inicioX;
                        const deltaY = e.touches[0].clientY - inicioY;
                        
                        anguloY += deltaX * 0.008;
                        anguloX -= deltaY * 0.008;
                        
                        inicioX = e.touches[0].clientX; 
                        inicioY = e.touches[0].clientY; 
                        actualizarPosiciones3D();
                    } else if (e.touches.length === 2) {
                        const distanciaActual = obtenerDistanciaTactil(e);
                        const factorEscala = distanciaActual / distanciaPinchInicial;
                        escalaUniverso = Math.max(0.5, Math.min(2.2, escalaBasePinch * factorEscala)); 
                        actualizarPosiciones3D();
                    }
                });

                window.addEventListener('touchend', (e) => { 
                    estaArrastrando = false; 
                    if (e.touches.length === 1) {
                        estaArrastrando = true;
                        inicioX = e.touches[0].clientX;
                        inicioY = e.touches[0].clientY;
                    }
                });
                
                function autoRotacion() { 
                    if (!estaArrastrando && !screen3.classList.contains('hidden')) { 
                        anguloY += 0.0015; 
                        actualizarPosiciones3D(); 
                    } 
                    requestAnimationFrame(autoRotacion); 
                }
                autoRotacion();
            }

            window.addEventListener('resize', () => { if (!screen3.classList.contains('hidden')) { generarUniverso(); } });
        </script>
    </body>
    </html>
